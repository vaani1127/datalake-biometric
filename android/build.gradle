buildscript {
  ext.DatalakeBiometric = [
    kotlinVersion: "2.0.21",
    minSdkVersion: 24,
    compileSdkVersion: 36,
    targetSdkVersion: 36
  ]

  ext.getExtOrDefault = { prop ->
    if (rootProject.ext.has(prop)) {
      return rootProject.ext.get(prop)
    }

    return DatalakeBiometric[prop]
  }

  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:8.7.2"
    // noinspection DifferentKotlinGradleVersion
    classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${getExtOrDefault('kotlinVersion')}"
  }
}


apply plugin: "com.android.library"
apply plugin: "kotlin-android"

apply plugin: "com.facebook.react"

android {
  namespace "com.datalakebiometric"

  compileSdkVersion getExtOrDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrDefault("minSdkVersion")
    targetSdkVersion getExtOrDefault("targetSdkVersion")
  }

  buildFeatures {
    buildConfig true
  }

  buildTypes {
    release {
      minifyEnabled false
    }
  }

  lint {
    disable "GradleCompatible"
  }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }

  aaptOptions {
    noCompress "tflite"
  }
}

dependencies {
  implementation "com.facebook.react:react-android"
  implementation 'org.tensorflow:tensorflow-lite:2.13.0'
  implementation 'org.tensorflow:tensorflow-lite-support:0.4.4'

  // Encrypted on-device SQLite (AES-256). Prebuilt .so for all ABIs — no NDK build.
  implementation 'net.zetetic:android-database-sqlcipher:4.5.4'
  implementation 'androidx.sqlite:sqlite:2.1.0'
  // Android-Keystore-backed EncryptedSharedPreferences for the DB passphrase
  // and the HMAC signing key (so neither lives in plain APK strings or prefs).
  implementation 'androidx.security:security-crypto:1.1.0-alpha06'
  // Reads the JPEG EXIF orientation that Vision Camera writes instead of
  // pre-rotating pixels, so face crops aren't taken from a sideways frame.
  implementation 'androidx.exifinterface:exifinterface:1.3.7'
}
