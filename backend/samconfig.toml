version = 0.1

[default.deploy.parameters]
stack_name        = "datalake-biometric"
region            = "ap-south-1"
resolve_s3        = true                      # SAM auto-creates the artifact bucket
capabilities      = "CAPABILITY_IAM"
confirm_changeset = false                     # CI deploys non-interactively
fail_on_empty_changeset = false               # idempotent re-deploys are OK
