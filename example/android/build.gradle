buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 26
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

// Force every native module to use the installed NDK. Some libraries (e.g.
// react-native-worklets-core) pin a different NDK version that isn't installed,
// which otherwise fails configuration with "did not have a source.properties file".
subprojects { subproject ->
    ["com.android.library", "com.android.application"].each { pluginId ->
        subproject.plugins.withId(pluginId) {
            subproject.android.ndkVersion = rootProject.ext.ndkVersion
        }
    }
}
